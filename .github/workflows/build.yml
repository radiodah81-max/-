name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract ZIP file (smart)
      run: |
        unzip narrative.zip -d ./temp
        # البحث عن gradlew ونقل الملفات من مجلده
        GRADLE_DIR=$(find ./temp -name "gradlew" -type f -exec dirname {} \; | head -1)
        if [ -n "$GRADLE_DIR" ]; then
          echo "✅ Found project in: $GRADLE_DIR"
          mv "$GRADLE_DIR"/* ./
        else
          echo "⚠️ gradlew not found, moving all files"
          mv ./temp/* ./
        fi
        rm -rf ./temp
        ls -la

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: app/build/outputs/apk/debug/app-debug.apk
